<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rocky Rocket Ride — Space RPO Tactics</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <div id="gameArea">

    <!-- Canvas -->
    <div id="canvasWrapper">
      <canvas id="gameCanvas"></canvas>
    </div>

    <!-- Right panel -->
    <div id="sidePanel">
      <div id="taskPanel"></div>
      <div id="launchPanel"></div>
    </div>

  </div>

  <!-- Bottom toolbar -->
  <div id="launchBar">

    <!-- Left: rocket launch -->
    <button id="btnLaunch">🚀 LAUNCH</button>

    <!-- Centre: speed controls -->
    <span class="bar-sep">|</span>
    <span class="bar-label">SPEED:</span>
    <button id="btn1x" class="speed-btn">1×</button>
    <button id="btn2x" class="speed-btn">2×</button>
    <button id="btn4x" class="speed-btn">4×</button>

    <!-- Zoom controls -->
    <span class="bar-sep">|</span>
    <span class="bar-label">ZOOM:</span>
    <button id="btnZoomOut" class="speed-btn">−</button>
    <button id="btnZoomIn" class="speed-btn">+</button>

    <!-- Centre: scenario selector -->
    <span class="bar-sep">|</span>
    <span class="bar-label">SCENARIO:</span>
    <select id="scenarioSelect" class="bar-select">
      <option value="scenario_01">1 — First Contact</option>
      <option value="scenario_02">2 — Multi-Orbit Defence</option>
      <option value="scenario_03">3 — Full Spectrum</option>
      <option value="sandbox">Sandbox</option>
    </select>
    <button id="btnScenario" class="bar-btn">▶ LOAD</button>

    <!-- Right: key hints -->
    <span style="margin-left:auto;font-size:9px;color:#334455">
      [Tab]/[,][.] Select &nbsp;[Q/E] Friendly &nbsp;[C] Coverage &nbsp;[T] Threats &nbsp;[+/-] Zoom &nbsp;[Space] Pause &nbsp;[Esc] Deselect &nbsp;[R] Restart &nbsp;[N] Next
    </span>

  </div>

</div>

<!-- Load order matters — vanilla JS, no bundler -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/entities.js"></script>
<script src="js/comms.js"></script>
<script src="js/ai.js"></script>
<script src="js/scenario.js"></script>
<script src="js/game.js"></script>
<script src="js/renderer.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>

</body>
</html>
